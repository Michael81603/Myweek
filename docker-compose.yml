services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: "change-me-in-production"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      SQLITE_NAME: "/app/data/db.sqlite3"
    volumes:
      - myweek_data:/app/data

volumes:
  myweek_data:
